apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: xai-assistant
  namespace: openclaw
spec:
  # This Secret must already exist in the target namespace.
  # Expected keys:
  # - XAI_API_KEY
  # - OPENAI_API_KEY
  # - OPENAI_BASE_URL
  envFrom:
    - secretRef:
        name: xai-provider-keys

  config:
    raw:
      agents:
        defaults:
          model:
            primary: "xai/grok-4-1-fast-reasoning"
          models:
            xai/grok-4-1-fast-reasoning:
              alias: "Grok 4.1 Fast Reasoning"
      models:
        mode: "merge"
        providers:
          xai:
            baseUrl: "https://api.x.ai/v1"
            # Resolve the key from the pod environment instead of storing it in config.
            apiKey: "${XAI_API_KEY}"
            api: "openai-completions"
            models:
              - id: "grok-4-1-fast-reasoning"
                name: "Grok 4.1 Fast Reasoning"
                reasoning: true
                input:
                  - "text"
                contextWindow: 200000
                maxTokens: 8192
  storage:
    persistence:
      enabled: true
      storageClass: auto-ebs-gp3
      size: 10Gi

  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: openclaw-alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
        alb.ingress.kubernetes.io/ssl-redirect: "443"
        alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600
        alb.ingress.kubernetes.io/healthcheck-path: /healthz
      hosts:
        - host: openclaw.claw-farm.com
      tls:
        - hosts:
            - openclaw.claw-farm.com
